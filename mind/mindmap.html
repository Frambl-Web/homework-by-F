<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mind Map | Сиреневая карта с зумом и панорамированием</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2canvas для экспорта -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* предотвращает выделение при зуме */
        }

        body {
            background: linear-gradient(145deg, #f3e8ff 0%, #e9d5ff 100%);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* полный контроль над жестами */
            position: fixed;
        }

        /* тулбар */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(107, 70, 193, 0.88);
            backdrop-filter: blur(12px);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 16px;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255, 220, 255, 0.4);
            justify-content: center;
            align-items: center;
        }

        .toolbar button {
            background: #ffffffdd;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            color: #4a1d6d;
        }

        .toolbar button i {
            font-size: 14px;
        }

        .toolbar button:active {
            transform: scale(0.96);
        }

        .toolbar .btn-primary {
            background: #c084fc;
            color: #2e1065;
        }
        .toolbar .btn-danger {
            background: #f472b6;
            color: white;
        }
        .toolbar .btn-save {
            background: #8b5cf6;
            color: white;
        }
        .toolbar .btn-export {
            background: #d8b4fe;
            color: #3b0764;
        }

        .status-msg {
            background: #2e1065cc;
            color: #f3e8ff;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        /* контейнер с возможностью масштабирования и панорамирования */
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin-top: 65px;
            touch-action: none;
            background: #faf5ff;
            background-image: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.08) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        #mindmap-canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #mindmap-nodes-layer {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .node {
            position: absolute;
            background: linear-gradient(135deg, #ffffff, #faf5ff);
            border-radius: 28px;
            padding: 10px 18px;
            min-width: 130px;
            max-width: 240px;
            box-shadow: 0 12px 28px rgba(107, 70, 193, 0.25), 0 4px 12px rgba(0,0,0,0.08);
            border: 1px solid rgba(168, 85, 247, 0.4);
            cursor: grab;
            transition: box-shadow 0.2s;
            font-weight: 500;
            word-break: break-word;
            font-size: 14px;
            color: #2e1065;
            backdrop-filter: blur(2px);
            will-change: transform;
        }
        .node:active {
            cursor: grabbing;
        }
        .node.editing {
            outline: 3px solid #c084fc;
            background: #f3e8ff;
            cursor: text;
            z-index: 100;
        }
        .node .node-content {
            outline: none;
            white-space: pre-wrap;
            padding-right: 8px;
            pointer-events: auto;
        }
        .node .node-actions {
            position: absolute;
            top: -12px;
            right: -12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(107, 70, 193, 0.85);
            border-radius: 40px;
            padding: 4px 8px;
            backdrop-filter: blur(6px);
            z-index: 20;
            pointer-events: auto;
        }
        .node:hover .node-actions {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .node .node-actions {
                opacity: 0.7;
            }
        }
        .node-actions button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 11px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4c1d95;
        }
        .node-actions button.add-child { background: #a855f7; color: white; }
        .node-actions button.delete-node { background: #f43f5e; color: white; }
        .node-actions button.edit-text { background: #fbbf24; color: #3b0764; }

        .instruction {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: rgba(107, 70, 193, 0.85);
            color: #f3e8ff;
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 10px;
            backdrop-filter: blur(6px);
            pointer-events: none;
            z-index: 100;
            font-weight: 500;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="btn-add-root"><i class="fas fa-plus-circle"></i> Центр</button>
    <button id="btn-save-storage" class="btn-save"><i class="fas fa-save"></i> Сохранить</button>
    <button id="btn-load" class="btn-primary"><i class="fas fa-folder-open"></i> Загрузить</button>
    <button id="btn-export-png" class="btn-export"><i class="fas fa-camera"></i> PNG</button>
    <button id="btn-export-jpeg" class="btn-export"><i class="fas fa-image"></i> JPEG</button>
    <button id="btn-clear" class="btn-danger"><i class="fas fa-trash-alt"></i> Очистить</button>
    <span class="status-msg" id="statusMsg">✨ Готово</span>
</div>

<div id="viewport">
    <canvas id="mindmap-canvas-layer"></canvas>
    <div id="mindmap-nodes-layer"></div>
</div>
<div class="instruction">
    <i class="fas fa-hand-peace"></i> Тащите блоки | Двумя пальцами — масштаб и перемещение по карте
</div>

<script>
    (function(){
        // ---- DOM элементы ----
        const viewport = document.getElementById('viewport');
        const nodesLayer = document.getElementById('mindmap-nodes-layer');
        const lineCanvas = document.getElementById('mindmap-canvas-layer');
        let ctx = lineCanvas.getContext('2d');
        
        // ---- Данные карты ----
        let nodes = [];          // { id, text, x, y, parentId }
        let nextId = 1;
        
        // ---- Трансформации (zoom + pan) ----
        let scale = 1;
        let panX = 0, panY = 0;
        let initialPinchDistance = 0;
        let initialScale = 1;
        let initialPanX = 0, initialPanY = 0;
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        
        // ---- Drag & drop для узлов (отдельно от панорамирования) ----
        let dragTarget = null;
        let dragOffsetX = 0, dragOffsetY = 0;
        let isDraggingNode = false;
        let activeTouchId = null;
        let editingNodeId = null;
        
        // ---- Инициализация и рендер ----
        function resizeAndUpdate() {
            const rect = viewport.getBoundingClientRect();
            lineCanvas.width = rect.width;
            lineCanvas.height = rect.height;
            lineCanvas.style.width = `${rect.width}px`;
            lineCanvas.style.height = `${rect.height}px`;
            updateTransform();
            drawAllLines();
        }
        
        function updateTransform() {
            nodesLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            drawAllLines();
        }
        
        // Перерисовка линий (с учётом трансформации)
        function drawAllLines() {
            if (!ctx) return;
            ctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            if (nodes.length === 0) return;
            
            const containerRect = viewport.getBoundingClientRect();
            for (let node of nodes) {
                if (node.parentId !== null) {
                    const parentNode = nodes.find(n => n.id === node.parentId);
                    if (parentNode) {
                        const fromElem = document.getElementById(`node-${parentNode.id}`);
                        const toElem = document.getElementById(`node-${node.id}`);
                        if (fromElem && toElem) {
                            const fromRect = fromElem.getBoundingClientRect();
                            const toRect = toElem.getBoundingClientRect();
                            // координаты относительно viewport
                            const startX = (fromRect.left + fromRect.right) / 2 - containerRect.left;
                            const startY = (fromRect.top + fromRect.bottom) / 2 - containerRect.top;
                            const endX = (toRect.left + toRect.right) / 2 - containerRect.left;
                            const endY = (toRect.top + toRect.bottom) / 2 - containerRect.top;
                            
                            ctx.beginPath();
                            ctx.moveTo(startX, startY);
                            ctx.lineTo(endX, endY);
                            ctx.strokeStyle = '#a78bfa';
                            ctx.lineWidth = 3 / Math.min(1, scale); // линии не утолщаются при зуме
                            ctx.stroke();
                            
                            const angle = Math.atan2(endY - startY, endX - startX);
                            const arrowSize = 10;
                            const arrowX = endX - 12 * Math.cos(angle);
                            const arrowY = endY - 12 * Math.sin(angle);
                            ctx.fillStyle = '#a78bfa';
                            ctx.beginPath();
                            ctx.moveTo(arrowX, arrowY);
                            ctx.lineTo(arrowX - arrowSize * Math.cos(angle - Math.PI/6), arrowY - arrowSize * Math.sin(angle - Math.PI/6));
                            ctx.lineTo(arrowX - arrowSize * Math.cos(angle + Math.PI/6), arrowY - arrowSize * Math.sin(angle + Math.PI/6));
                            ctx.fill();
                        }
                    }
                }
            }
        }
        
        // Рендер всех узлов (создание DOM)
        function renderAllNodes() {
            nodesLayer.innerHTML = '';
            for (let node of nodes) {
                createNodeElement(node);
            }
            drawAllLines();
        }
        
        function createNodeElement(node) {
            const div = document.createElement('div');
            div.className = 'node';
            div.id = `node-${node.id}`;
            // позиция в "мировых" координатах (без трансформации)
            div.style.left = `${node.x}px`;
            div.style.top = `${node.y}px`;
            div.style.position = 'absolute';
            div.style.touchAction = 'none';
            
            const contentSpan = document.createElement('div');
            contentSpan.className = 'node-content';
            contentSpan.innerText = node.text || 'Новый блок';
            
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'node-actions';
            
            const addBtn = document.createElement('button');
            addBtn.innerHTML = '<i class="fas fa-plus"></i>';
            addBtn.title = 'Добавить потомка';
            addBtn.onclick = (e) => { e.stopPropagation(); addChildNode(node.id); };
            
            const editBtn = document.createElement('button');
            editBtn.innerHTML = '<i class="fas fa-pen"></i>';
            editBtn.title = 'Редактировать';
            editBtn.onclick = (e) => { e.stopPropagation(); startEditing(node.id); };
            
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
            deleteBtn.title = 'Удалить ветку';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteNodeAndChildren(node.id); };
            
            actionsDiv.appendChild(addBtn);
            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(deleteBtn);
            div.appendChild(contentSpan);
            div.appendChild(actionsDiv);
            
            // Drag start для узла (отличаем от жестов двумя пальцами)
            div.addEventListener('mousedown', onNodeDragStart);
            div.addEventListener('touchstart', onNodeDragStart, { passive: false });
            div.addEventListener('dblclick', (e) => { e.stopPropagation(); startEditing(node.id); });
            
            nodesLayer.appendChild(div);
            return div;
        }
        
        // --- Логика перетаскивания узлов (с учетом текущего масштаба) ---
        function onNodeDragStart(e) {
            if (editingNodeId !== null) finishEditing();
            if (e.touches && e.touches.length > 1) return; // два пальца - не перетаскиваем узел
            e.preventDefault();
            e.stopPropagation();
            
            let clientX, clientY;
            if (e.type === 'mousedown') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else {
                const touch = e.touches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
                activeTouchId = touch.identifier;
            }
            const targetDiv = e.target.closest('.node');
            if (!targetDiv) return;
            const nodeId = parseInt(targetDiv.id.split('-')[1]);
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;
            
            // Координаты узла в мировом пространстве (уже хранятся x,y)
            // Получаем bounding rect узла с учетом текущей трансформации, чтобы вычислить смещение
            const rect = targetDiv.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            // Мировые координаты угла узла
            const worldLeft = node.x;
            const worldTop = node.y;
            // экранные координаты с учетом пана и зума
            const screenX = worldLeft * scale + panX + viewportRect.left;
            const screenY = worldTop * scale + panY + viewportRect.top;
            dragOffsetX = clientX - screenX;
            dragOffsetY = clientY - screenY;
            
            dragTarget = node;
            isDraggingNode = true;
            targetDiv.style.cursor = 'grabbing';
            targetDiv.style.zIndex = '999';
            
            if (e.type === 'mousedown') {
                window.addEventListener('mousemove', onNodeDragMove);
                window.addEventListener('mouseup', onNodeDragEnd);
            } else {
                window.addEventListener('touchmove', onNodeDragMove, { passive: false });
                window.addEventListener('touchend', onNodeDragEnd);
                window.addEventListener('touchcancel', onNodeDragEnd);
            }
        }
        
        function onNodeDragMove(e) {
            if (!isDraggingNode || !dragTarget) return;
            e.preventDefault();
            let clientX, clientY;
            if (e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else if (e.type === 'touchmove') {
                const touch = Array.from(e.touches).find(t => t.identifier === activeTouchId);
                if (!touch) return;
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else return;
            
            const viewportRect = viewport.getBoundingClientRect();
            // Новые мировые координаты: (экранная позиция - pan - смещение) / scale
            let newWorldX = (clientX - dragOffsetX - viewportRect.left - panX) / scale;
            let newWorldY = (clientY - dragOffsetY - viewportRect.top - panY) / scale;
            
            // Ограничения (не уходить слишком далеко)
            newWorldX = Math.min(Math.max(-500, newWorldX), 2000);
            newWorldY = Math.min(Math.max(-500, newWorldY), 2000);
            
            dragTarget.x = newWorldX;
            dragTarget.y = newWorldY;
            const nodeDiv = document.getElementById(`node-${dragTarget.id}`);
            if (nodeDiv) {
                nodeDiv.style.left = `${newWorldX}px`;
                nodeDiv.style.top = `${newWorldY}px`;
            }
            drawAllLines();
        }
        
        function onNodeDragEnd(e) {
            if (isDraggingNode && dragTarget) {
                const nodeDiv = document.getElementById(`node-${dragTarget.id}`);
                if (nodeDiv) nodeDiv.style.cursor = 'grab';
                if (nodeDiv) nodeDiv.style.zIndex = '10';
                saveToLocalStorage();
                updateStatus('Позиция сохранена');
            }
            isDraggingNode = false;
            dragTarget = null;
            activeTouchId = null;
            window.removeEventListener('mousemove', onNodeDragMove);
            window.removeEventListener('mouseup', onNodeDragEnd);
            window.removeEventListener('touchmove', onNodeDragMove);
            window.removeEventListener('touchend', onNodeDragEnd);
            window.removeEventListener('touchcancel', onNodeDragEnd);
        }
        
        // ---- Жесты: Pan (один палец вне узлов) + Pinch Zoom ----
        function getTouchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }
        
        function getTouchCenter(touches) {
            if (touches.length === 1) return { x: touches[0].clientX, y: touches[0].clientY };
            return {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2
            };
        }
        
        let activePinch = false;
        let pinchStartScale = 1;
        let pinchStartPanX = 0, pinchStartPanY = 0;
        let pinchCenterX = 0, pinchCenterY = 0;
        
        function onTouchStart(e) {
            if (isDraggingNode) return; // если тянем узел, не мешаем
            if (e.touches.length === 2) {
                e.preventDefault();
                activePinch = true;
                const distance = getTouchDistance(e.touches);
                initialPinchDistance = distance;
                pinchStartScale = scale;
                pinchStartPanX = panX;
                pinchStartPanY = panY;
                const center = getTouchCenter(e.touches);
                const viewportRect = viewport.getBoundingClientRect();
                pinchCenterX = center.x - viewportRect.left;
                pinchCenterY = center.y - viewportRect.top;
            } else if (e.touches.length === 1 && !activePinch) {
                // начало панорамирования (если не нажали на узел)
                const touch = e.touches[0];
                const targetElem = document.elementFromPoint(touch.clientX, touch.clientY);
                if (!targetElem?.closest?.('.node')) {
                    isPanning = true;
                    panStartX = touch.clientX - panX;
                    panStartY = touch.clientY - panY;
                    e.preventDefault();
                }
            }
        }
        
        function onTouchMove(e) {
            if (isDraggingNode) return;
            if (activePinch && e.touches.length === 2) {
                e.preventDefault();
                const newDistance = getTouchDistance(e.touches);
                if (initialPinchDistance > 0) {
                    let newScale = pinchStartScale * (newDistance / initialPinchDistance);
                    newScale = Math.min(Math.max(0.5, newScale), 3.5);
                    // Корректируем pan, чтобы центр масштабирования оставался на месте
                    const viewportRect = viewport.getBoundingClientRect();
                    const centerX = pinchCenterX;
                    const centerY = pinchCenterY;
                    const oldScale = scale;
                    scale = newScale;
                    // Смещение, чтобы точка центра оставалась под пальцами
                    panX = pinchStartPanX + (centerX - pinchStartPanX) * (1 - newScale / oldScale);
                    panY = pinchStartPanY + (centerY - pinchStartPanY) * (1 - newScale / oldScale);
                    updateTransform();
                    drawAllLines();
                }
            } else if (isPanning && e.touches.length === 1) {
                const touch = e.touches[0];
                panX = touch.clientX - panStartX;
                panY = touch.clientY - panStartY;
                // ограничиваем панорамирование (можно уйти далеко)
                updateTransform();
                drawAllLines();
                e.preventDefault();
            }
        }
        
        function onTouchEnd(e) {
            if (activePinch) {
                activePinch = false;
                initialPinchDistance = 0;
                saveToLocalStorage();
            }
            if (isPanning) {
                isPanning = false;
                saveToLocalStorage();
            }
        }
        
        // ---- мышиное панорамирование для десктопа ----
        let isMousePanning = false;
        let mousePanStartX = 0, mousePanStartY = 0;
        function onMouseDown(e) {
            if (e.target.closest('.node')) return; // если кликнули по узлу - не панорамируем
            isMousePanning = true;
            mousePanStartX = e.clientX - panX;
            mousePanStartY = e.clientY - panY;
            e.preventDefault();
        }
        function onMouseMove(e) {
            if (isMousePanning && !isDraggingNode) {
                panX = e.clientX - mousePanStartX;
                panY = e.clientY - mousePanStartY;
                updateTransform();
                drawAllLines();
                e.preventDefault();
            }
        }
        function onMouseUp(e) {
            if (isMousePanning) {
                isMousePanning = false;
                saveToLocalStorage();
            }
        }
        
        // ---- Операции с узлами (добавление, удаление, редактирование) ----
        function addChildNode(parentId) {
            const parent = nodes.find(n => n.id === parentId);
            if (!parent) return;
            let childX = parent.x + 200;
            let childY = parent.y + (Math.random() * 80 - 40);
            // ограничения
            childX = Math.min(Math.max(-300, childX), 1500);
            childY = Math.min(Math.max(-300, childY), 1200);
            const newNode = { id: nextId++, text: 'Новая идея 💡', x: childX, y: childY, parentId: parentId };
            nodes.push(newNode);
            renderAllNodes();
            saveToLocalStorage();
            updateStatus('Потомок добавлен');
        }
        
        function deleteNodeAndChildren(nodeId) {
            const toDelete = new Set();
            const collect = (id) => {
                toDelete.add(id);
                nodes.filter(n => n.parentId === id).forEach(child => collect(child.id));
            };
            collect(nodeId);
            nodes = nodes.filter(n => !toDelete.has(n.id));
            renderAllNodes();
            saveToLocalStorage();
            updateStatus('Ветка удалена');
        }
        
        function addRootNode() {
            const centerWorldX = 400;
            const centerWorldY = 300;
            const newNode = { id: nextId++, text: 'Центральная тема 🎯', x: centerWorldX, y: centerWorldY, parentId: null };
            nodes.push(newNode);
            renderAllNodes();
            saveToLocalStorage();
            updateStatus('Центральный блок добавлен');
            // сбросить панорамирование на центр? нет, оставляем как есть
        }
        
        function startEditing(nodeId) {
            if (editingNodeId) finishEditing();
            const nodeDiv = document.getElementById(`node-${nodeId}`);
            if (!nodeDiv) return;
            const contentDiv = nodeDiv.querySelector('.node-content');
            const oldText = contentDiv.innerText;
            const input = document.createElement('textarea');
            input.value = oldText;
            input.style.width = '100%';
            input.style.padding = '8px';
            input.style.borderRadius = '20px';
            input.style.border = '2px solid #c084fc';
            input.style.fontFamily = 'inherit';
            input.rows = 2;
            contentDiv.innerHTML = '';
            contentDiv.appendChild(input);
            nodeDiv.classList.add('editing');
            input.focus();
            const saveEdit = () => {
                const newText = input.value.trim();
                const node = nodes.find(n => n.id === nodeId);
                if (node) node.text = newText || oldText;
                finishEditing();
                renderAllNodes();
                saveToLocalStorage();
            };
            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
                if (e.key === 'Escape') { finishEditing(); renderAllNodes(); }
            });
            editingNodeId = nodeId;
        }
        
        function finishEditing() {
            if (editingNodeId) {
                const oldDiv = document.getElementById(`node-${editingNodeId}`);
                if (oldDiv) oldDiv.classList.remove('editing');
                editingNodeId = null;
            }
        }
        
        function clearAll() {
            if (confirm('Удалить все блоки?')) {
                nodes = [];
                nextId = 1;
                renderAllNodes();
                saveToLocalStorage();
                updateStatus('Карта очищена');
            }
        }
        
        // ---- Сохранение и загрузка (включая pan/zoom) ----
        function saveToLocalStorage() {
            const data = {
                nodes: nodes.map(n => ({ id: n.id, text: n.text, x: n.x, y: n.y, parentId: n.parentId })),
                nextId: nextId,
                view: { scale, panX, panY }
            };
            localStorage.setItem('mindmap_lilac_full', JSON.stringify(data));
            updateStatus('💾 Сохранено');
            setTimeout(() => updateStatus('✨'), 1200);
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('mindmap_lilac_full');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    nodes = data.nodes;
                    nextId = data.nextId;
                    if (data.view) {
                        scale = data.view.scale;
                        panX = data.view.panX;
                        panY = data.view.panY;
                    }
                    renderAllNodes();
                    updateTransform();
                    updateStatus('Загружено');
                } catch(e) { updateStatus('Ошибка'); }
            } else {
                // демо
                nodes = [];
                nextId = 1;
                const root = { id: nextId++, text: '🌸 Моя карта', x: 400, y: 300, parentId: null };
                const child1 = { id: nextId++, text: '✨ Идея', x: 650, y: 200, parentId: root.id };
                const child2 = { id: nextId++, text: '🎨 Креатив', x: 650, y: 400, parentId: root.id };
                nodes.push(root, child1, child2);
                scale = 1; panX = 0; panY = 0;
                renderAllNodes();
                updateTransform();
                updateStatus('Демо-карта');
            }
            drawAllLines();
        }
        
        async function exportAsImage(format = 'png') {
            updateStatus('Экспорт...');
            const originalTransform = nodesLayer.style.transform;
            nodesLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            await new Promise(r => setTimeout(r, 100));
            try {
                const canvasImg = await html2canvas(viewport, { scale: 2, backgroundColor: '#faf5ff' });
                const link = document.createElement('a');
                link.download = `mindmap_${Date.now()}.${format === 'png' ? 'png' : 'jpg'}`;
                link.href = canvasImg.toDataURL(format === 'png' ? 'image/png' : 'image/jpeg', 0.95);
                link.click();
                updateStatus(`Экспорт ${format.toUpperCase()}`);
            } catch(e) { updateStatus('Ошибка экспорта'); }
            nodesLayer.style.transform = originalTransform;
        }
        
        function updateStatus(msg) {
            const el = document.getElementById('statusMsg');
            if (el) el.innerHTML = msg;
            setTimeout(() => { if(document.getElementById('statusMsg')?.innerHTML === msg) document.getElementById('statusMsg').innerHTML = '✨ Готово'; }, 2000);
        }
        
        // ---- Подписка на события ----
        viewport.addEventListener('touchstart', onTouchStart, { passive: false });
        viewport.addEventListener('touchmove', onTouchMove, { passive: false });
        viewport.addEventListener('touchend', onTouchEnd);
        viewport.addEventListener('touchcancel', onTouchEnd);
        viewport.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        window.addEventListener('resize', () => { resizeAndUpdate(); drawAllLines(); });
        
        document.getElementById('btn-add-root').onclick = () => addRootNode();
        document.getElementById('btn-save-storage').onclick = () => saveToLocalStorage();
        document.getElementById('btn-load').onclick = () => loadFromLocalStorage();
        document.getElementById('btn-clear').onclick = () => clearAll();
        document.getElementById('btn-export-png').onclick = () => exportAsImage('png');
        document.getElementById('btn-export-jpeg').onclick = () => exportAsImage('jpeg');
        
        resizeAndUpdate();
        loadFromLocalStorage();
        setInterval(() => drawAllLines(), 200);
    })();
</script>
</body>
</html>
