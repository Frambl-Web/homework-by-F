<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mind Map | Цветные ветки + Экспорт без теней</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2canvas для экспорта -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f3e8ff 0%, #e9d5ff 100%);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            position: fixed;
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(107, 70, 193, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 16px;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255, 220, 255, 0.4);
            justify-content: center;
            align-items: center;
        }

        .toolbar button {
            background: #ffffffdd;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            color: #4a1d6d;
        }

        .toolbar button i {
            font-size: 14px;
            pointer-events: none;
        }

        .toolbar button:active {
            transform: scale(0.96);
        }

        .toolbar .btn-primary {
            background: #c084fc;
            color: #2e1065;
        }
        .toolbar .btn-danger {
            background: #f472b6;
            color: white;
        }
        .toolbar .btn-save {
            background: #8b5cf6;
            color: white;
        }
        .toolbar .btn-export {
            background: #d8b4fe;
            color: #3b0764;
        }

        .status-msg {
            background: #2e1065cc;
            color: #f3e8ff;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin-top: 65px;
            touch-action: none;
            background: #faf5ff;
            background-image: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.08) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        #mindmap-canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #mindmap-nodes-layer {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .node {
            position: absolute;
            border-radius: 28px;
            padding: 10px 18px;
            min-width: 130px;
            max-width: 240px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            cursor: grab;
            transition: box-shadow 0.2s, transform 0.05s;
            font-weight: 500;
            word-break: break-word;
            font-size: 14px;
            backdrop-filter: blur(2px);
            will-change: transform;
            touch-action: none;
        }
        .node:active {
            cursor: grabbing;
        }
        .node.editing {
            outline: 3px solid #c084fc;
            background: #f3e8ff !important;
            cursor: text;
            z-index: 100;
        }
        .node .node-content {
            outline: none;
            white-space: pre-wrap;
            padding-right: 8px;
            pointer-events: auto;
            color: #2e1065;
            font-weight: 500;
        }
        .node .node-actions {
            position: absolute;
            top: -14px;
            right: -14px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(107, 70, 193, 0.9);
            border-radius: 40px;
            padding: 5px 10px;
            backdrop-filter: blur(8px);
            z-index: 20;
            pointer-events: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .node:hover .node-actions,
        .node .node-actions:active {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .node .node-actions {
                opacity: 0;
            }
            .node.touch-active .node-actions {
                opacity: 1;
            }
        }
        .node-actions button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4c1d95;
            transition: transform 0.05s;
            touch-action: manipulation;
        }
        .node-actions button:active {
            transform: scale(0.92);
        }
        .node-actions button.add-child { background: #a855f7; color: white; }
        .node-actions button.delete-node { background: #f43f5e; color: white; }
        .node-actions button.edit-text { background: #fbbf24; color: #3b0764; }

        .instruction {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: rgba(107, 70, 193, 0.85);
            color: #f3e8ff;
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 10px;
            backdrop-filter: blur(6px);
            pointer-events: none;
            z-index: 100;
            font-weight: 500;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="btn-add-root"><i class="fas fa-plus-circle"></i> Центр</button>
    <button id="btn-save-storage" class="btn-save"><i class="fas fa-save"></i> Сохранить</button>
    <button id="btn-load" class="btn-primary"><i class="fas fa-folder-open"></i> Загрузить</button>
    <button id="btn-export-png" class="btn-export"><i class="fas fa-camera"></i> PNG</button>
    <button id="btn-export-jpeg" class="btn-export"><i class="fas fa-image"></i> JPEG</button>
    <button id="btn-clear" class="btn-danger"><i class="fas fa-trash-alt"></i> Очистить</button>
    <span class="status-msg" id="statusMsg">✨ Готово</span>
</div>

<div id="viewport">
    <canvas id="mindmap-canvas-layer"></canvas>
    <div id="mindmap-nodes-layer"></div>
</div>
<div class="instruction">
    <i class="fas fa-hand-peace"></i> Тащите блоки | Двумя пальцами — масштаб и перемещение
</div>

<script>
    (function(){
        // ---- DOM элементы ----
        const viewport = document.getElementById('viewport');
        const nodesLayer = document.getElementById('mindmap-nodes-layer');
        const lineCanvas = document.getElementById('mindmap-canvas-layer');
        let ctx = lineCanvas.getContext('2d');
        
        // ---- Данные карты ----
        let nodes = [];
        let nextId = 1;
        
        // ---- Цветовая палитра для разных уровней вложенности (сиреневые/фиолетовые оттенки) ----
        const colorPalette = [
            { bg: 'linear-gradient(135deg, #f3e8ff, #e9d5ff)', border: '#c084fc' },  // корневой - светлый
            { bg: 'linear-gradient(135deg, #e0b3ff, #d28cff)', border: '#a855f7' },
            { bg: 'linear-gradient(135deg, #d28cff, #c56eff)', border: '#9333ea' },
            { bg: 'linear-gradient(135deg, #c56eff, #b24bf3)', border: '#7e22ce' },
            { bg: 'linear-gradient(135deg, #b24bf3, #9b2de5)', border: '#6b21a5' },
            { bg: 'linear-gradient(135deg, #9b2de5, #8418d6)', border: '#581c87' }
        ];
        
        // Функция для определения глубины узла (расстояние от корня)
        function getNodeDepth(nodeId, visited = new Set()) {
            if (visited.has(nodeId)) return 0;
            visited.add(nodeId);
            const node = nodes.find(n => n.id === nodeId);
            if (!node || node.parentId === null) return 0;
            const parent = nodes.find(n => n.id === node.parentId);
            if (!parent) return 0;
            return 1 + getNodeDepth(parent.id, visited);
        }
        
        // Получить цвет для узла на основе глубины
        function getNodeColors(nodeId) {
            const depth = getNodeDepth(nodeId);
            const index = Math.min(depth, colorPalette.length - 1);
            return colorPalette[index];
        }
        
        // ---- Трансформации ----
        let scale = 1;
        let panX = 0, panY = 0;
        let initialPinchDistance = 0;
        let pinchStartScale = 1;
        let pinchStartPanX = 0, pinchStartPanY = 0;
        let pinchCenterX = 0, pinchCenterY = 0;
        let activePinch = false;
        
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        
        let dragTarget = null;
        let dragOffsetX = 0, dragOffsetY = 0;
        let isDraggingNode = false;
        let activeTouchId = null;
        let editingNodeId = null;
        
        // ---- Инициализация ----
        function resizeAndUpdate() {
            const rect = viewport.getBoundingClientRect();
            lineCanvas.width = rect.width;
            lineCanvas.height = rect.height;
            lineCanvas.style.width = `${rect.width}px`;
            lineCanvas.style.height = `${rect.height}px`;
            updateTransform();
            drawAllLines();
        }
        
        function updateTransform() {
            nodesLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            drawAllLines();
        }
        
        function drawAllLines() {
            if (!ctx) return;
            ctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
            if (nodes.length === 0) return;
            
            const containerRect = viewport.getBoundingClientRect();
            for (let node of nodes) {
                if (node.parentId !== null) {
                    const parentNode = nodes.find(n => n.id === node.parentId);
                    if (parentNode) {
                        const fromElem = document.getElementById(`node-${parentNode.id}`);
                        const toElem = document.getElementById(`node-${node.id}`);
                        if (fromElem && toElem) {
                            const fromRect = fromElem.getBoundingClientRect();
                            const toRect = toElem.getBoundingClientRect();
                            const startX = (fromRect.left + fromRect.right) / 2 - containerRect.left;
                            const startY = (fromRect.top + fromRect.bottom) / 2 - containerRect.top;
                            const endX = (toRect.left + toRect.right) / 2 - containerRect.left;
                            const endY = (toRect.top + toRect.bottom) / 2 - containerRect.top;
                            
                            ctx.beginPath();
                            ctx.moveTo(startX, startY);
                            ctx.lineTo(endX, endY);
                            ctx.strokeStyle = '#a78bfa';
                            ctx.lineWidth = 3 / Math.min(1, scale);
                            ctx.shadowBlur = 0; // убираем тени на линиях
                            ctx.stroke();
                            
                            const angle = Math.atan2(endY - startY, endX - startX);
                            const arrowSize = 10;
                            const arrowX = endX - 12 * Math.cos(angle);
                            const arrowY = endY - 12 * Math.sin(angle);
                            ctx.fillStyle = '#a78bfa';
                            ctx.beginPath();
                            ctx.moveTo(arrowX, arrowY);
                            ctx.lineTo(arrowX - arrowSize * Math.cos(angle - Math.PI/6), arrowY - arrowSize * Math.sin(angle - Math.PI/6));
                            ctx.lineTo(arrowX - arrowSize * Math.cos(angle + Math.PI/6), arrowY - arrowSize * Math.sin(angle + Math.PI/6));
                            ctx.fill();
                        }
                    }
                }
            }
        }
        
        // Обновление цветов всех узлов (при изменении структуры)
        function updateAllNodeColors() {
            document.querySelectorAll('.node').forEach(nodeDiv => {
                const nodeId = parseInt(nodeDiv.id.split('-')[1]);
                const colors = getNodeColors(nodeId);
                nodeDiv.style.background = colors.bg;
                nodeDiv.style.border = `1px solid ${colors.border}`;
            });
        }
        
        function renderAllNodes() {
            nodesLayer.innerHTML = '';
            for (let node of nodes) {
                createNodeElement(node);
            }
            drawAllLines();
        }
        
        function createNodeElement(node) {
            const div = document.createElement('div');
            div.className = 'node';
            div.id = `node-${node.id}`;
            div.style.left = `${node.x}px`;
            div.style.top = `${node.y}px`;
            div.style.position = 'absolute';
            div.style.touchAction = 'none';
            
            // Применяем цвет в зависимости от глубины
            const colors = getNodeColors(node.id);
            div.style.background = colors.bg;
            div.style.border = `1px solid ${colors.border}`;
            
            const contentSpan = document.createElement('div');
            contentSpan.className = 'node-content';
            contentSpan.innerText = node.text || 'Новый блок';
            
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'node-actions';
            
            const addBtn = document.createElement('button');
            addBtn.innerHTML = '<i class="fas fa-plus"></i>';
            addBtn.title = 'Добавить потомка';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                addChildNode(node.id);
            });
            addBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                addChildNode(node.id);
            }, { passive: false });
            
            const editBtn = document.createElement('button');
            editBtn.innerHTML = '<i class="fas fa-pen"></i>';
            editBtn.title = 'Редактировать';
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                startEditing(node.id);
            });
            editBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                startEditing(node.id);
            }, { passive: false });
            
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
            deleteBtn.title = 'Удалить ветку';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                deleteNodeAndChildren(node.id);
            });
            deleteBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                deleteNodeAndChildren(node.id);
            }, { passive: false });
            
            actionsDiv.appendChild(addBtn);
            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(deleteBtn);
            div.appendChild(contentSpan);
            div.appendChild(actionsDiv);
            
            div.addEventListener('touchstart', (e) => {
                if (e.target.closest('.node-actions button')) return;
                div.classList.add('touch-active');
                setTimeout(() => {
                    div.classList.remove('touch-active');
                }, 800);
            });
            
            div.addEventListener('mousedown', onNodeDragStart);
            div.addEventListener('touchstart', onNodeDragStart, { passive: false });
            div.addEventListener('dblclick', (e) => { e.stopPropagation(); startEditing(node.id); });
            
            nodesLayer.appendChild(div);
            return div;
        }
        
        // Обновить цвета после изменения структуры (добавление/удаление)
        function refreshColors() {
            setTimeout(() => {
                updateAllNodeColors();
            }, 10);
        }
        
        // --- Drag & Drop ---
        function onNodeDragStart(e) {
            if (editingNodeId !== null) finishEditing();
            if (e.target.closest('.node-actions button')) {
                e.preventDefault();
                e.stopPropagation();
                return;
            }
            if (e.touches && e.touches.length > 1) return;
            e.preventDefault();
            e.stopPropagation();
            
            let clientX, clientY;
            if (e.type === 'mousedown') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else {
                const touch = e.touches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
                activeTouchId = touch.identifier;
            }
            const targetDiv = e.target.closest('.node');
            if (!targetDiv) return;
            const nodeId = parseInt(targetDiv.id.split('-')[1]);
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;
            
            const rect = targetDiv.getBoundingClientRect();
            const viewportRect = viewport.getBoundingClientRect();
            const screenX = node.x * scale + panX + viewportRect.left;
            const screenY = node.y * scale + panY + viewportRect.top;
            dragOffsetX = clientX - screenX;
            dragOffsetY = clientY - screenY;
            
            dragTarget = node;
            isDraggingNode = true;
            targetDiv.style.cursor = 'grabbing';
            targetDiv.style.zIndex = '999';
            
            if (e.type === 'mousedown') {
                window.addEventListener('mousemove', onNodeDragMove);
                window.addEventListener('mouseup', onNodeDragEnd);
            } else {
                window.addEventListener('touchmove', onNodeDragMove, { passive: false });
                window.addEventListener('touchend', onNodeDragEnd);
                window.addEventListener('touchcancel', onNodeDragEnd);
            }
        }
        
        function onNodeDragMove(e) {
            if (!isDraggingNode || !dragTarget) return;
            e.preventDefault();
            let clientX, clientY;
            if (e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else if (e.type === 'touchmove') {
                const touch = Array.from(e.touches).find(t => t.identifier === activeTouchId);
                if (!touch) return;
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else return;
            
            const viewportRect = viewport.getBoundingClientRect();
            let newWorldX = (clientX - dragOffsetX - viewportRect.left - panX) / scale;
            let newWorldY = (clientY - dragOffsetY - viewportRect.top - panY) / scale;
            
            newWorldX = Math.min(Math.max(-800, newWorldX), 2500);
            newWorldY = Math.min(Math.max(-800, newWorldY), 2000);
            
            dragTarget.x = newWorldX;
            dragTarget.y = newWorldY;
            const nodeDiv = document.getElementById(`node-${dragTarget.id}`);
            if (nodeDiv) {
                nodeDiv.style.left = `${newWorldX}px`;
                nodeDiv.style.top = `${newWorldY}px`;
            }
            drawAllLines();
        }
        
        function onNodeDragEnd(e) {
            if (isDraggingNode && dragTarget) {
                const nodeDiv = document.getElementById(`node-${dragTarget.id}`);
                if (nodeDiv) nodeDiv.style.cursor = 'grab';
                if (nodeDiv) nodeDiv.style.zIndex = '10';
                saveToLocalStorage();
                updateStatus('Позиция сохранена');
            }
            isDraggingNode = false;
            dragTarget = null;
            activeTouchId = null;
            window.removeEventListener('mousemove', onNodeDragMove);
            window.removeEventListener('mouseup', onNodeDragEnd);
            window.removeEventListener('touchmove', onNodeDragMove);
            window.removeEventListener('touchend', onNodeDragEnd);
            window.removeEventListener('touchcancel', onNodeDragEnd);
        }
        
        // ---- Жесты ----
        function getTouchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }
        
        function getTouchCenter(touches) {
            if (touches.length === 1) return { x: touches[0].clientX, y: touches[0].clientY };
            return {
                x: (touches[0].clientX + touches[1].clientX) / 2,
                y: (touches[0].clientY + touches[1].clientY) / 2
            };
        }
        
        function onTouchStart(e) {
            if (isDraggingNode) return;
            if (e.touches.length === 2) {
                e.preventDefault();
                activePinch = true;
                const distance = getTouchDistance(e.touches);
                initialPinchDistance = distance;
                pinchStartScale = scale;
                pinchStartPanX = panX;
                pinchStartPanY = panY;
                const center = getTouchCenter(e.touches);
                const viewportRect = viewport.getBoundingClientRect();
                pinchCenterX = center.x - viewportRect.left;
                pinchCenterY = center.y - viewportRect.top;
            } else if (e.touches.length === 1 && !activePinch) {
                const touch = e.touches[0];
                const targetElem = document.elementFromPoint(touch.clientX, touch.clientY);
                if (!targetElem?.closest?.('.node') && !targetElem?.closest?.('.node-actions')) {
                    isPanning = true;
                    panStartX = touch.clientX - panX;
                    panStartY = touch.clientY - panY;
                    e.preventDefault();
                }
            }
        }
        
        function onTouchMove(e) {
            if (isDraggingNode) return;
            if (activePinch && e.touches.length === 2) {
                e.preventDefault();
                const newDistance = getTouchDistance(e.touches);
                if (initialPinchDistance > 0) {
                    let newScale = pinchStartScale * (newDistance / initialPinchDistance);
                    newScale = Math.min(Math.max(0.5, newScale), 3.5);
                    const viewportRect = viewport.getBoundingClientRect();
                    const centerX = pinchCenterX;
                    const centerY = pinchCenterY;
                    const oldScale = scale;
                    scale = newScale;
                    panX = pinchStartPanX + (centerX - pinchStartPanX) * (1 - newScale / oldScale);
                    panY = pinchStartPanY + (centerY - pinchStartPanY) * (1 - newScale / oldScale);
                    updateTransform();
                    drawAllLines();
                }
            } else if (isPanning && e.touches.length === 1) {
                const touch = e.touches[0];
                panX = touch.clientX - panStartX;
                panY = touch.clientY - panStartY;
                updateTransform();
                drawAllLines();
                e.preventDefault();
            }
        }
        
        function onTouchEnd(e) {
            if (activePinch) {
                activePinch = false;
                initialPinchDistance = 0;
                saveToLocalStorage();
            }
            if (isPanning) {
                isPanning = false;
                saveToLocalStorage();
            }
        }
        
        let isMousePanning = false;
        let mousePanStartX = 0, mousePanStartY = 0;
        function onMouseDown(e) {
            if (e.target.closest('.node') || e.target.closest('.node-actions')) return;
            isMousePanning = true;
            mousePanStartX = e.clientX - panX;
            mousePanStartY = e.clientY - panY;
            e.preventDefault();
        }
        function onMouseMove(e) {
            if (isMousePanning && !isDraggingNode) {
                panX = e.clientX - mousePanStartX;
                panY = e.clientY - mousePanStartY;
                updateTransform();
                drawAllLines();
                e.preventDefault();
            }
        }
        function onMouseUp(e) {
            if (isMousePanning) {
                isMousePanning = false;
                saveToLocalStorage();
            }
        }
        
        // ---- Операции с узлами ----
        function addChildNode(parentId) {
            const parent = nodes.find(n => n.id === parentId);
            if (!parent) return;
            let childX = parent.x + 200;
            let childY = parent.y + (Math.random() * 80 - 40);
            childX = Math.min(Math.max(-300, childX), 1800);
            childY = Math.min(Math.max(-300, childY), 1500);
            const newNode = { id: nextId++, text: 'Новая идея 💡', x: childX, y: childY, parentId: parentId };
            nodes.push(newNode);
            renderAllNodes();
            refreshColors();
            saveToLocalStorage();
            updateStatus('Потомок добавлен');
        }
        
        function deleteNodeAndChildren(nodeId) {
            const toDelete = new Set();
            const collect = (id) => {
                toDelete.add(id);
                nodes.filter(n => n.parentId === id).forEach(child => collect(child.id));
            };
            collect(nodeId);
            nodes = nodes.filter(n => !toDelete.has(n.id));
            renderAllNodes();
            refreshColors();
            saveToLocalStorage();
            updateStatus('Ветка удалена');
        }
        
        function addRootNode() {
            const centerWorldX = 400;
            const centerWorldY = 300;
            const newNode = { id: nextId++, text: 'Центральная тема 🎯', x: centerWorldX, y: centerWorldY, parentId: null };
            nodes.push(newNode);
            renderAllNodes();
            refreshColors();
            saveToLocalStorage();
            updateStatus('Центральный блок добавлен');
        }
        
        function startEditing(nodeId) {
            if (editingNodeId) finishEditing();
            const nodeDiv = document.getElementById(`node-${nodeId}`);
            if (!nodeDiv) return;
            const contentDiv = nodeDiv.querySelector('.node-content');
            const oldText = contentDiv.innerText;
            const input = document.createElement('textarea');
            input.value = oldText;
            input.style.width = '100%';
            input.style.padding = '8px';
            input.style.borderRadius = '20px';
            input.style.border = '2px solid #c084fc';
            input.style.fontFamily = 'inherit';
            input.style.fontSize = '14px';
            input.rows = 2;
            contentDiv.innerHTML = '';
            contentDiv.appendChild(input);
            nodeDiv.classList.add('editing');
            input.focus();
            const saveEdit = () => {
                const newText = input.value.trim();
                const node = nodes.find(n => n.id === nodeId);
                if (node) node.text = newText || oldText;
                finishEditing();
                renderAllNodes();
                refreshColors();
                saveToLocalStorage();
            };
            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
                if (e.key === 'Escape') { finishEditing(); renderAllNodes(); refreshColors(); }
            });
            editingNodeId = nodeId;
        }
        
        function finishEditing() {
            if (editingNodeId) {
                const oldDiv = document.getElementById(`node-${editingNodeId}`);
                if (oldDiv) oldDiv.classList.remove('editing');
                editingNodeId = null;
            }
        }
        
        function clearAll() {
            if (confirm('Удалить все блоки?')) {
                nodes = [];
                nextId = 1;
                renderAllNodes();
                saveToLocalStorage();
                updateStatus('Карта очищена');
            }
        }
        
        // ---- Сохранение и загрузка ----
        function saveToLocalStorage() {
            const data = {
                nodes: nodes.map(n => ({ id: n.id, text: n.text, x: n.x, y: n.y, parentId: n.parentId })),
                nextId: nextId,
                view: { scale, panX, panY }
            };
            localStorage.setItem('mindmap_lilac_full', JSON.stringify(data));
            updateStatus('💾 Сохранено');
            setTimeout(() => updateStatus('✨'), 1200);
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('mindmap_lilac_full');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    nodes = data.nodes;
                    nextId = data.nextId;
                    if (data.view) {
                        scale = data.view.scale;
                        panX = data.view.panX;
                        panY = data.view.panY;
                    }
                    renderAllNodes();
                    updateTransform();
                    refreshColors();
                    updateStatus('Загружено');
                } catch(e) { updateStatus('Ошибка'); }
            } else {
                nodes = [];
                nextId = 1;
                const root = { id: nextId++, text: '🌸 Моя карта', x: 400, y: 300, parentId: null };
                const child1 = { id: nextId++, text: '✨ Идея', x: 650, y: 200, parentId: root.id };
                const child2 = { id: nextId++, text: '🎨 Креатив', x: 650, y: 400, parentId: root.id };
                const grandchild = { id: nextId++, text: '🌟 Детализация', x: 880, y: 280, parentId: child1.id };
                nodes.push(root, child1, child2, grandchild);
                scale = 1; panX = 0; panY = 0;
                renderAllNodes();
                updateTransform();
                refreshColors();
                updateStatus('Демо-карта');
            }
            drawAllLines();
        }
        
        // Исправленный экспорт без теней (отключаем box-shadow и фильтры на время скриншота)
        async function exportAsImage(format = 'png') {
            updateStatus('Экспорт...');
            // Сохраняем оригинальные стили
            const allNodes = document.querySelectorAll('.node');
            const originalShadows = [];
            const originalBackdrops = [];
            allNodes.forEach((node, idx) => {
                originalShadows[idx] = node.style.boxShadow;
                originalBackdrops[idx] = node.style.backdropFilter;
                node.style.boxShadow = 'none';
                node.style.backdropFilter = 'none';
            });
            
            // Небольшая задержка для применения стилей
            await new Promise(r => setTimeout(r, 50));
            
            try {
                const canvasImg = await html2canvas(viewport, {
                    scale: 2.5,
                    backgroundColor: '#faf5ff',
                    useCORS: false,
                    logging: false,
                    shadow: false,
                    onclone: (clonedDoc, element) => {
                        // В клоне также убираем тени
                        const clonedNodes = clonedDoc.querySelectorAll('.node');
                        clonedNodes.forEach(node => {
                            node.style.boxShadow = 'none';
                            node.style.backdropFilter = 'none';
                        });
                    }
                });
                const link = document.createElement('a');
                const mime = format === 'png' ? 'image/png' : 'image/jpeg';
                const ext = format === 'png' ? 'png' : 'jpg';
                link.download = `mindmap_${Date.now()}.${ext}`;
                link.href = canvasImg.toDataURL(mime, 0.96);
                link.click();
                updateStatus(`Экспорт ${format.toUpperCase()} готов`);
            } catch(e) {
                console.error(e);
                updateStatus('Ошибка экспорта');
            } finally {
                // Возвращаем тени обратно
                allNodes.forEach((node, idx) => {
                    node.style.boxShadow = originalShadows[idx] || '0 8px 20px rgba(0,0,0,0.15)';
                    node.style.backdropFilter = originalBackdrops[idx] || 'blur(2px)';
                });
            }
        }
        
        function updateStatus(msg) {
            const el = document.getElementById('statusMsg');
            if (el) el.innerHTML = msg;
            setTimeout(() => { if(document.getElementById('statusMsg')?.innerHTML === msg) document.getElementById('statusMsg').innerHTML = '✨ Готово'; }, 2000);
        }
        
        // ---- События ----
        viewport.addEventListener('touchstart', onTouchStart, { passive: false });
        viewport.addEventListener('touchmove', onTouchMove, { passive: false });
        viewport.addEventListener('touchend', onTouchEnd);
        viewport.addEventListener('touchcancel', onTouchEnd);
        viewport.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        window.addEventListener('resize', () => { resizeAndUpdate(); drawAllLines(); });
        
        document.getElementById('btn-add-root').onclick = () => addRootNode();
        document.getElementById('btn-save-storage').onclick = () => saveToLocalStorage();
        document.getElementById('btn-load').onclick = () => loadFromLocalStorage();
        document.getElementById('btn-clear').onclick = () => clearAll();
        document.getElementById('btn-export-png').onclick = () => exportAsImage('png');
        document.getElementById('btn-export-jpeg').onclick = () => exportAsImage('jpeg');
        
        resizeAndUpdate();
        loadFromLocalStorage();
        setInterval(() => drawAllLines(), 200);
    })();
</script>
</body>
</html>
